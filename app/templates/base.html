<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Life OS — Finance</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Life OS">
  <link rel="apple-touch-icon" href="/static/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <span class="nav-logo">Life OS</span>
    <a href="/" class="{{ 'active' if active_page == 'financials' else '' }}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Financials</span>
    </a>
    <a href="/expenses" class="{{ 'active' if active_page == 'expenses' else '' }}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>Expenses</span>
    </a>
    <a href="/categories" class="{{ 'active' if active_page == 'categories' else '' }}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l6 3"/></svg>
      <span>Categories</span>
    </a>
    <a href="/transactions" class="{{ 'active' if active_page == 'transactions' else '' }}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Transactions</span>
    </a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <button id="fab-add" class="fab" aria-label="Add transaction" onclick="openAddModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div id="add-modal-overlay" class="modal-overlay" style="display:none" onclick="closeAddModalBackdrop(event)">
    <div class="modal-card glass-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="section-header" style="margin:0">Add Transaction</span>
        <button type="button" class="modal-close" aria-label="Close" onclick="closeAddModal()">&times;</button>
      </div>
      <form id="add-form" onsubmit="submitAddForm(event)">
        <div class="type-toggle">
          <button type="button" class="type-btn active" data-type="Expense">Expense</button>
          <button type="button" class="type-btn" data-type="Income">Income</button>
          <button type="button" class="type-btn" data-type="Transfer">Transfer</button>
          <button type="button" class="type-btn" data-type="Investment">Investment</button>
        </div>
        <input type="hidden" id="add-type" value="Expense">

        <div class="form-group">
          <label for="add-amount">Amount</label>
          <input type="number" id="add-amount" step="0.01" min="0.01" inputmode="decimal" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label for="add-description">Description</label>
          <input type="text" id="add-description" placeholder="e.g. groceries" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="add-category">Category</label>
            <select id="add-category">
              <option value="">Auto-detect</option>
            </select>
          </div>
          <div class="form-group">
            <label for="add-date">Date</label>
            <input type="date" id="add-date">
          </div>
        </div>

        <label class="checkbox-row" id="add-impulse-row">
          <input type="checkbox" id="add-impulse">
          <span>Impulse buy</span>
        </label>

        <button type="submit" class="btn-primary" id="add-submit">Save</button>
        <p class="form-error" id="add-error" style="display:none"></p>
      </form>
    </div>
  </div>

  <script>
    const _addTypeButtons = document.querySelectorAll('.type-btn');
    _addTypeButtons.forEach(btn => btn.addEventListener('click', () => {
      _addTypeButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('add-type').value = btn.dataset.type;
      document.getElementById('add-impulse-row').style.display =
        btn.dataset.type === 'Expense' ? '' : 'none';
    }));

    let _categoriesLoaded = false;
    async function openAddModal() {
      document.getElementById('add-modal-overlay').style.display = 'flex';
      document.getElementById('add-date').valueAsDate = new Date();
      if (!_categoriesLoaded) {
        try {
          const res = await fetch('/api/categories');
          const cats = await res.json();
          const select = document.getElementById('add-category');
          cats.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            select.appendChild(opt);
          });
          _categoriesLoaded = true;
        } catch (e) { /* category list is optional; auto-detect still works */ }
      }
      document.getElementById('add-amount').focus();
    }

    function closeAddModal() {
      document.getElementById('add-modal-overlay').style.display = 'none';
      document.getElementById('add-form').reset();
      document.getElementById('add-error').style.display = 'none';
      _addTypeButtons.forEach(b => b.classList.remove('active'));
      document.querySelector('.type-btn[data-type="Expense"]').classList.add('active');
      document.getElementById('add-type').value = 'Expense';
      document.getElementById('add-impulse-row').style.display = '';
      const submitBtn = document.getElementById('add-submit');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save';
    }

    function closeAddModalBackdrop(e) {
      if (e.target.id === 'add-modal-overlay') closeAddModal();
    }

    async function submitAddForm(event) {
      event.preventDefault();
      const errorEl = document.getElementById('add-error');
      errorEl.style.display = 'none';

      const payload = {
        type: document.getElementById('add-type').value,
        amount: parseFloat(document.getElementById('add-amount').value),
        description: document.getElementById('add-description').value.trim(),
        category: document.getElementById('add-category').value,
        date: document.getElementById('add-date').value,
        is_impulse: document.getElementById('add-impulse').checked,
      };

      const submitBtn = document.getElementById('add-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const res = await fetch('/api/transactions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          errorEl.textContent = err.detail || 'Failed to save transaction.';
          errorEl.style.display = '';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Save';
          return;
        }
        window.location.reload();
      } catch (e) {
        errorEl.textContent = 'Network error. Try again.';
        errorEl.style.display = '';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save';
      }
    }
  </script>
</body>
</html>
